name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "TAG_NAME=$TAG"     >> $GITHUB_ENV
          echo "VERSION=$VERSION"  >> $GITHUB_ENV
          echo "Tag: $TAG  ->  Version: $VERSION"

      - name: Write version.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const payload = {
              version: '${{ env.VERSION }}',
              productName: 'Skydiving Dashboard',
              generatedAt: new Date().toISOString()
            };
            fs.writeFileSync('version.json', JSON.stringify(payload, null, 2) + '\n', 'utf8');
            console.log('version.json written:', payload.version);
          "

      - name: Patch package.json version
        shell: bash
        working-directory: electron-wrapper
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ env.VERSION }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n', 'utf8');
            console.log('package.json version set to', pkg.version);
          "

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-wrapper/package-lock.json

      - name: Install dependencies
        working-directory: electron-wrapper
        run: npm ci

      - name: Build Windows installer
        working-directory: electron-wrapper
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find installer
        shell: bash
        run: |
          INSTALLER=$(ls electron-wrapper/dist/*.exe | grep -v blockmap | head -1)
          echo "INSTALLER_PATH=$INSTALLER" >> $GITHUB_ENV
          echo "Found: $INSTALLER"

      - name: Build Pi zip
        shell: bash
        run: |
          mkdir -p pi_build/config
          cp dashboard.html    pi_build/
          cp dz_feed_server.py pi_build/
          cp version.json      pi_build/
          cp pi/install_pi.sh  pi_build/
          for f in config/*.json; do
            basename="$(basename "$f")"
            if [[ "$basename" != *"Copy"* ]]; then
              cp "$f" "pi_build/config/$basename"
            fi
          done
          cd pi_build
          7z a ../SkydivingDashboard-RaspberryPi-Kiosk.zip .
          cd ..
          echo "Pi zip contents:"
          7z l SkydivingDashboard-RaspberryPi-Kiosk.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Skydiving Dashboard ${{ env.TAG_NAME }}"
          draft: false
          prerelease: false
          files: |
            ${{ env.INSTALLER_PATH }}
            SkydivingDashboard-RaspberryPi-Kiosk.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
